<!DOCTYPE html>
<html lang="en">
<head>
   <style>
    :root{
        --primary-color: brown; /* Now we don't have to create these anymore anywhere.*/
        --custom-width: 200px;
    }
    .container{
        background-color: aqua;
        height: 600px;
        border: solid black 2px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .box{
        /* --primary-color: brown;     custom variable*/
        /* --custom-width: 200px;         Here these customm variables can be used only inside of this box*/
        background-color: blue;
        width: var(--custom-width);
        /* width: 200px; */
        /* height: 200px; */
        height: var(--custom-width);
        border: solid var(--primary-color) 2px;
        padding: 3px;
        margin: 3px;
        /*box-shadow: -10px -7px brown; 10px is the x-offset(horizontally move) , 5px is the y-offset(vertically move)*/

       /* box-shadow: 10px 5px 30px brown;  The last one which is 30px is the blurness , there is no -ve blur.*/
       /* box-shadow: 10px 5px 5px 20px brown;  Blur with spread, here 20px is for spread*/
       /* box-shadow: inset 10px 15px brown;  inset means shadow movinf towards inside not to outside.*/

       box-shadow: 5px 8px var(--primary-color),10px 10px green; 
    }
    #head1{
         /* text-shadow: 5px 10px 15px yellow;  As much as we increase the blur ness it will disappear*/
        /* text-shadow: 12px 13px 20px green; */
        /* text-shadow: 10px 12px ; bydefault the shoadow color is black */
        text-shadow: 2px 3px green, 4px 5px blue, 6px 7px red;      /* Multiple text shadow. */
    }
   </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img src="logo.avif" alt="DevOps logo" width="200px" height="200px">
            <h2 id="head1">Welcome to DevOps Journey.</h2>

            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Excepturi, similique.</p>
        </div>
    </div>
</body>
</html>
