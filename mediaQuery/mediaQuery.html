<!DOCTYPE html>

<html>

    <head>
        
        <style>

            .box{

                height: 500px;
                width: 500px;
                background-color: aqua;                                 /* Here we have set our box color in aqua. */
                border: solid black 3px;

            }
            @media (min-width: 500px){                                    /* It states that after it will cross 500px it will change the color of box, aqua to blue. */

                .box{

                    background-color: blue;

                }

            }
            @media (max-width: 700px){                                    /* Here it means after it will shrink <700px then it will change the color aqua to greenyellow. */

                .box{

                    background-color: greenyellow;

                }

            }
            @media (min-width:400px) and (max-width:500px){               /* We can set the limits here like when we cross 400px but lies with in 500px it will change it's color to brown. */

                .box{

                    background-color: brown;

                }

            }

            .container1{

                background-color: blueviolet;
                border: solid black 5px;
                padding: 2px;
                margin: 2px;
                display: flex;                                            /* All the boxes of this container1 are flex items now. */

            }

            .box{

                width: 200px;
                height: 200px;
                border: solid burlywood 2px;
                padding: 2px;
                margin: 2px;

            }

            #box1{

                background-color: aqua;  

            }

            #box2{

                background-color: blue;
                
            }

            #box3{

                background-color: orange;
                
            }

            #box4{

                background-color: brown;
                
            }
            @media (min-width:640px){                                     /* It means if the size is  crossed 640px then  the flex items will be placed in a single row side by side. */

                .container1{

                    flex-direction: row;

                }

            }
            @media (max-width:640px){                                     /* If the size has not been crossed 640px means it still lie with in 640px then flex items will be placed in terms of column, one after one in downward. */

                .container1{

                    flex-direction: column;

                }

            } 

            .container2{

                border: solid black 2px;
                background-color: greenyellow;
                display: flex;                                            /* Now the items of this container2 also are flex items. */
                flex-direction: row;
                width: 450px;

            }

            #box5{

                background-color: aquamarine;
                border: solid brown 2px;
                width: 47%;
                padding: 3px;
                margin: 2px;
                display: flex;                                            /* Now here Text1 and Text2 will act as the flex items and placed as column one after one towrds down. */
                flex-direction: column;

            }

            #box6{

                background-color: blue;
                border: solid red 2px;
                width: 47%;
                padding: 3px;
                margin: 2px;

            }

            p{

                border: solid blueviolet 2px;

            }
            @media (max-width:640px){                                     /* Up to 640px all the flex items will be placed as column, means one after one downwards of it. */

                .container2{

                    flex-direction: column;

                }

            }

        </style>

    </head>

    <body>

        <div class="box"> Hello Las Vegas</div>

        <div class="container1">

            <div class="box" id="box1">A</div>
            <div class="box" id="box2">B</div>
            <div class="box" id="box3">C</div>
            <div class="box" id="box4">D</div>

        </div>

        <div class="container2">

            <div id="box5">

                <p>Text1</p>
                <p>Text2</p>

            </div>

            <div id="box6">

                <img src="cheetha.png" alt="Click Here to see cheetha" width="200px" height="200px">

            </div>

        </div>

    </body>

</html>
