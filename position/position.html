<!DOCTYPE html>

<html>

    <head>

        <style>

            .container{

                border: inset orangered 30px;
                height: 400px;

            }

            .image1{
                
                top: 20px;                             /* All these properties not going to work because bydefault position is static , and in static nothing these top, right, left and bottom going to work. */
                right: 16px;
                bottom: 4px;     
                left: 20px;

            }

            .image2{

                position: relative;                    /* In relative position the image got changed it's position from it's original place to that place where all these top, right, bottom and left will lie so there will be a gap. */
                top: 15px;
                right: 20px;
                bottom: 12px;
                left: 2px;

            }

            .image3{

                position: absolute;                    /* Here whatever we apply top, right, bottom and left  we compare it's from closest ancestor element not from it's original place the way it do in the case of relative. */
                top: 30px;
                right: 11px;
                left: 500px;
                bottom: 12px;

            }

            .image4{

                position: fixed;                       /* When i will scroll the image4 going to be scrolled up to bottom of the window. */
                top: 100px;
                right: 50px;
                bottom: 17px;
                left: 750px;

            }

            .image1{   

                position: sticky;                      /* If we will use this sticky then it also going to be scrolled but up to the only bottom of it's parent element, and it's parent is div element. */
                top: 100px;

            }

            .box{

                background-color: aquamarine;
                height: 1000px;

            }

        </style>

    </head>

    <body>

        <div class="container">

            <img class="image1" src="p1.png" alt="poster1" width="250px" height="250px">
            <img class="image2" src="p2.png" alt="poster2" width="250px" height="250px">
            <img class="image3" src="p3.png" alt="poster3" width="250px" height="250px">
            <img class="image4" src="p4.png" alt="poster4" width="250px" height="250px">

        </div>
    
        <div class="box"> From here we can see the sticky position iamge not comming to this point. so it ended at the end of it's parent element. </div>

    </body>

</html>
