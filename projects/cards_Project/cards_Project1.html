<!DOCTYPE html>

<html>

    <head>
        
        <style>
        
            *{

                padding: 0;
                margin:0;

            }

            .container{

                width: 100vw;
                height: 100vh;
                background-color: #6FCCE3;
                display: flex;
                justify-content: center;
                align-items: center;

            }

            .card{

                width: 360px;
                height: 500px;
                background-color: bisque;
                border-radius: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: 10px;
                font-size: 1.6em;

            }

            .card img{

                width:99%;
                height: 40%;
                border-radius: 20px;

            }

            .card h2{

                font-weight: bold;

            }
        
        </style>
    </head>

    <body>

        <div class="container">
            
            <div class="card">
                
                <img src="LeetCode.png" alt="">
                <h2>Improve your coding skill By Leetcode.</h2>
                 <br>
                 <p>Hello programmer I am leetcode and you can use me for coding practices, contest and interview preparation.</p>
        
            </div>
    
        </div>

    </body>

</html>
