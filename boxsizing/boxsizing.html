<!DOCTYPE html>

<html>

    <head>
    
        <style>
            
            *{

                box-sizing: border-box;                 /* The box-sizing only apply n the block elements not in inline elements. */

            }                                           /* Because in inline elements the content's size is not fix, means as we know the width and height not going to be affected in inline. */

            .box{

                display: inline;                        /* Here as we have mentioned this div or block element as inline element here the width and height not going to be same as we written there. */
                width: 300px;                           /* Get ignored. */
                height: 100px;                          /* Get ignored. */
                border: solid black 5px;                /* Border will render. */
                padding: 50px;                          /* Padding also going to be apply. */ 
                margin: 40px;                           /* Margin will be also visible but only by horizontally because of the inline element. */

            }

            span{

                display: block;                         /* All the border, padding and margin can be applyed. */
                border: inset green 9px; 
                width: 300px;                           /* After the border-sizing the width and height not going to change, even after we apply the padding and margin. */
                height: 150px;
                padding: 60px;
                margin: 7px;
                
            }
    
        </style>

    </head>

    <body>

        <div class="box">Welcome to my world.</div>
        <br><br><br><br><br><br><br>
        <span>Hey guys.</span>

    </body>

</html>
